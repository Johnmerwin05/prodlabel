openapi: 3.1.0
info:
  title: Enterprise Labeling Management API
  version: 1.0.0
servers:
  - url: /api/v1
security:
  - sanctum: []
components:
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer
  schemas:
    Customer:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        code: { type: string }
        status: { type: string, enum: [active, inactive] }
    Product:
      type: object
      properties:
        id: { type: integer }
        product_id: { type: string }
        sku: { type: string }
        name: { type: string }
        quantity: { type: integer }
        print_count: { type: integer }
    PrintJob:
      type: object
      properties:
        job_uuid: { type: string, format: uuid }
        status: { type: string }
        total_products: { type: integer }
        completed_products: { type: integer }
        failed_products: { type: integer }
paths:
  /dashboard:
    get:
      summary: Dashboard statistics
      responses:
        "200": { description: OK }
  /customers:
    get:
      summary: List customers
      responses:
        "200": { description: Paginated customers }
    post:
      summary: Create customer
      responses:
        "201": { description: Created }
  /customers/{id}:
    get:
      summary: View customer
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: OK }
    put:
      summary: Update customer
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200": { description: OK }
    delete:
      summary: Soft delete customer
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204": { description: Deleted }
  /products:
    get:
      summary: List products
      responses:
        "200": { description: Paginated products }
    post:
      summary: Create product
      responses:
        "201": { description: Created }
  /prints:
    post:
      summary: Queue mass print or reprint job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customer_id, template_id, product_ids]
              properties:
                customer_id: { type: integer }
                template_id: { type: integer }
                product_ids:
                  type: array
                  items: { type: integer }
                reprint_reason: { type: string }
      responses:
        "201": { description: Print job queued }
